<!--
  CR11 Badge SVG template — reference skeleton (not loaded by runtime).
  Pilot badges copy this structure verbatim. Paste Lucide outline path(s)
  into the inner <g>.

    - Canvas:     512 x 512
    - Grid:       Lucide 24 x 24
    - Scale:      10.67 (24 * 10.67 ≈ 256), centered with 128 gutter
    - Stroke:     currentColor @ 2px (Lucide outline)
    - Accent:     circular chip at fill-opacity 0.12, uses --badge-accent
    - Light/dark: via currentColor on parent `.badge-frame`
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512"
     role="img" aria-label="Badge template">
  <circle cx="256" cy="256" r="256" fill="var(--badge-accent, #1F2937)" fill-opacity="0.12"/>
  <g transform="translate(128, 128) scale(10.67)"
     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
     fill="none">
    <!-- Paste Lucide outline path(s) here. -->
  </g>
</svg>
